name: Regulations Daily Slack Digest

on:
  schedule:
    - cron: '0 12 * * *' # Runs every day at 12:00 UTC
  workflow_dispatch:

jobs:
  slacky:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests slackclient

      - name: Run Regulations Digest Script
        env:
          SLACK_API_TOKEN: ${{ secrets.SLACK_API_TOKEN }}
          REGULATIONS_API_KEY: ${{ secrets.REGULATIONS_API_KEY }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL || 'slack-bots' }}
        run: python get_new_rules.py

